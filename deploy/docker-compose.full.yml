services:
  core:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    ports:
      - "3750:3750"
    environment:
      LIFE_ENGINE_CORE_HOST: "0.0.0.0"
      LIFE_ENGINE_CORE_PORT: "3750"
      LIFE_ENGINE_CORE_LOG_LEVEL: "info"
      LIFE_ENGINE_CORE_DATA_DIR: "/data"
      LIFE_ENGINE_STORAGE_PATH: "/data/core.db"
      LIFE_ENGINE_STORAGE_PASSPHRASE: "${LIFE_ENGINE_STORAGE_PASSPHRASE}"
      LIFE_ENGINE_AUTH_PROVIDER: "oidc"
      LIFE_ENGINE_OIDC_ISSUER_URL: "http://pocket-id:80"
      LIFE_ENGINE_OIDC_CLIENT_ID: "life-engine"
    volumes:
      - ./data:/data
      - ./plugins:/plugins
      - ./workflows:/workflows
      - ./config.toml:/app/config.toml:ro
    depends_on:
      pocket-id:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3750/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    ports:
      - "3751:3751"
    environment:
      PUBLIC_APP_URL: "http://localhost:3751"
    volumes:
      - pocket-id-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3751/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pocket-id-data:
