# Delete a document by ID.
#
# Pass-through to storage_doc_delete via the system.crud plugin.
# The transport layer provides :collection and :id as path parameters.

workflows:
  collection.delete:
    id: collection.delete
    name: Collection Delete
    description: Delete a document by ID
    trigger:
      endpoint: "DELETE /api/v1/data/:collection/:id"
    steps:
      - plugin: system.crud
        action: delete
