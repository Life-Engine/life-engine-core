[plugin]
id = "com.life-engine.webhook-sender"
name = "Webhook Sender"
version = "0.1.0"
description = "Outbound webhook dispatcher — sends events to external URLs"

[actions.subscribe]
description = "Create a new webhook subscription"

[actions.unsubscribe]
description = "Remove a webhook subscription"

[actions.subscriptions]
description = "List active webhook subscriptions"

[actions.deliveries]
description = "List webhook delivery history"

[capabilities]
required = ["storage:doc:read", "storage:doc:write", "http:outbound", "events:subscribe", "logging"]
