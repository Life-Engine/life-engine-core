[plugin]
id = "com.life-engine.search-indexer"
name = "Search Indexer"
version = "0.1.0"
description = "Full-text search indexing powered by Tantivy"

[actions.search]
description = "Search across all indexed collections"

[actions.reindex]
description = "Trigger a full reindex of all collections"

[actions.status]
description = "Get indexer status and statistics"

[capabilities]
required = ["storage:doc:read", "events:subscribe", "logging"]

[config]
schema = """
{
  "type": "object",
  "properties": {
    "index_path": { "type": "string", "default": "data/search-index" },
    "commit_threshold": { "type": "integer", "default": 1000 }
  }
}
"""
