[plugin]
id = "com.life-engine.connector-contacts"
name = "Contacts Connector"
version = "0.1.0"
description = "CardDAV and Google Contacts connector — syncs contacts"

[actions.sync]
description = "Sync contacts from configured providers"

[actions.status]
description = "Get the current sync status"

[capabilities]
required = ["storage:doc:read", "storage:doc:write", "http:outbound", "credentials:read", "credentials:write"]

[config]
schema = """
{
  "type": "object",
  "properties": {
    "carddav_server_url": { "type": "string" },
    "carddav_username": { "type": "string" },
    "carddav_addressbook_path": { "type": "string" },
    "google_client_id": { "type": "string" },
    "sync_interval_secs": { "type": "integer", "default": 300 }
  }
}
"""
