services:
  core:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    ports:
      - "3750:3750"
    environment:
      LIFE_ENGINE_CORE_HOST: "0.0.0.0"
      LIFE_ENGINE_CORE_PORT: "3750"
      LIFE_ENGINE_CORE_LOG_LEVEL: "info"
      LIFE_ENGINE_CORE_DATA_DIR: "/data"
      LIFE_ENGINE_STORAGE_PATH: "/data/core.db"
      LIFE_ENGINE_STORAGE_PASSPHRASE: "${LIFE_ENGINE_STORAGE_PASSPHRASE}"
      LIFE_ENGINE_AUTH_PROVIDER: "local-token"
      LIFE_ENGINE_BEHIND_PROXY: "true"
      LIFE_ENGINE_TRANSPORTS_REST_PORT: "3750"
    volumes:
      - core-data:/data
      - ./plugins:/plugins
      - ./workflows:/workflows
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3750/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  core-data:
