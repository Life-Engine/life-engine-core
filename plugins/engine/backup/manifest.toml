[plugin]
id = "com.life-engine.backup"
name = "Encrypted Remote Backup"
version = "0.1.0"
description = "Encrypted backup to local, S3-compatible, or WebDAV storage targets"

[actions.backup]
description = "Run a full backup"

[actions.backup_incremental]
description = "Run an incremental backup"

[actions.restore]
description = "Restore from a backup"

[actions.restore_partial]
description = "Restore specific collections from a backup"

[actions.list_backups]
description = "List available backups"

[actions.status]
description = "Get backup status and schedule"

[capabilities]
required = ["storage:doc:read", "storage:doc:write", "config:read", "logging"]

[config]
schema = """
{
  "type": "object",
  "properties": {
    "backend": { "type": "string", "enum": ["local", "s3", "webdav"] },
    "schedule": { "type": "string", "description": "Cron expression" },
    "retention_days": { "type": "integer", "default": 30 },
    "encryption_enabled": { "type": "boolean", "default": true }
  }
}
"""
